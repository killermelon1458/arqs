services:
  arqs-server:
    build: .
    container_name: arqs-server
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/data
    # Expose for local development. In production behind cloudflared,
    # you can remove this published port and keep the server internal-only.
    ports:
      - "8080:8080"

  # Optional stack service for production tunnel use.
  # Fill in your token and then you can remove the public port publish above.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: arqs-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - arqs-server
    profiles: ["tunnel"]
